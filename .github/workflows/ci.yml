name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Ortho.sln

      - name: Build
        run: dotnet build Ortho.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Ortho.sln --no-build --configuration Release --logger "console;verbosity=normal"
