name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Ortho.sln

      - name: Build
        run: dotnet build Ortho.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Ortho.sln --no-build --configuration Release --logger "console;verbosity=normal"

  ml-core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core deps
        run: pip install numpy pytest pyyaml

      - name: Test ml core (NumPy)
        working-directory: ml
        run: PYTHONPATH=. pytest tests -q

  publish:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish win-x64
        run: dotnet publish src/Ortho.UI -c Release -r win-x64 --self-contained -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ortho-win-x64
          path: publish
          retention-days: 30
